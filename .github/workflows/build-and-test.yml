name: build-and-test

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
            name: "Windows 2022 MSVC Release",
            os: windows-2022,
            build_type: "Release", cc: "cl", cxx: "cl",
          }
          - {
            name: "Ubuntu 22.04 GCC Release",
            os: ubuntu-22.04,
            build_type: "Release", cc: "gcc", cxx: "g++"
          }
          - {
            name: "Ubuntu 22.04 Clang Release",
            os: ubuntu-22.04,
            build_type: "Release", cc: "clang", cxx: "clang++"
          }
          - {
            name: "Ubuntu 24.04 GCC Release",
            os: ubuntu-24.04,
            build_type: "Release", cc: "gcc", cxx: "g++"
          }
          - {
            name: "macOS 26 ARM64 Clang Release",
            os: macos-26,
            build_type: "Release", cc: "clang", cxx: "clang++"
          }
          - {
            name: "macOS 26 ARM64 LLVM 20 Release",
            os: macos-26,
            build_type: "Release", cc: "clang", cxx: "clang++",
            llvm: 20
          }
          - {
            name: "Windows 2022 MSVC Debug",
            os: windows-2022,
            build_type: "Debug", cc: "cl", cxx: "cl",
          }
          - {
            name: "Ubuntu 22.04 GCC Debug",
            os: ubuntu-22.04,
            build_type: "Debug", cc: "gcc", cxx: "g++"
          }
          - {
            name: "Ubuntu 22.04 Clang Debug",
            os: ubuntu-22.04,
            build_type: "Debug", cc: "clang", cxx: "clang++"
          }
          - {
            name: "Ubuntu 24.04 GCC Debug",
            os: ubuntu-24.04,
            build_type: "Debug", cc: "gcc", cxx: "g++"
          }
          - {
            name: "macOS 26 ARM64 Clang Debug",
            os: macos-26,
            build_type: "Debug", cc: "clang", cxx: "clang++"
          }
          - {
            name: "macOS 26 ARM64 LLVM 20 Debug",
            os: macos-26,
            build_type: "Debug", cc: "clang", cxx: "clang++",
            llvm: 20
          }
    steps:
    - uses: actions/checkout@v6

    - name: Install LLVM ${{ matrix.config.llvm }}
      if: matrix.config.llvm
      run: |
        brew install llvm@${{ matrix.config.llvm }}
        echo "$(brew --prefix llvm@${{ matrix.config.llvm }})/bin" >> $GITHUB_PATH

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} -DCMAKE_C_COMPILER=${{ matrix.config.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{ matrix.config.build_type }}

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{ matrix.config.build_type }} -V
